<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | Ride W Me Cabo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" type="image/png" href="Images/ridewmelogo.png">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* Estilos específicos para la tabla del admin que complementan tu main.css */
    .admin-wrapper {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #ccc;
    }
    th, td {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 15px 10px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      color: var(--green-soft);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
    }
    tr:hover {
      background: rgba(255,255,255,0.02);
    }
    .top-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      justify-content: flex-end;
    }
    .action-btn {
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 6px;
      margin: 2px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .pdf { background: rgba(0, 119, 255, 0.2); color: #66aaff; border: 1px solid #0077ff;}
    .pdf:hover { background: #0077ff; color: #fff;}
    .edit { background: rgba(255, 170, 0, 0.2); color: #ffaa00; border: 1px solid #ffaa00;}
    .edit:hover { background: #ffaa00; color: #000;}
    .delete { background: rgba(204, 0, 0, 0.2); color: #ff4444; border: 1px solid #cc0000;}
    .delete:hover { background: #cc0000; color: #fff;}
    
    /* Ajuste para inputs del admin */
    .admin-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background-color: rgba(10, 10, 10, 0.8);
      color: #fff;
      font-size: 0.95rem;
      margin-bottom: 20px;
    }
    .admin-input:focus {
      outline: none;
      border-color: var(--green-soft);
    }
  </style>
</head>

<body>

  <header class="new-header inner-header" style="height: 35vh;">
    <div class="header-overlay"></div>
    <div class="header-top">
      <div class="logo-text">RIDE W ME 🐳</div>
      <div class="menu-icon" onclick="window.location.href='index.html'" style="font-size: 1.2rem;">🏠 Home</div>
    </div>
    <div class="header-content" style="margin-bottom: 50px;">
      <h1>Admin Dashboard</h1>
    </div>
  </header>

  <main class="admin-wrapper">

    <div id="loginBox" class="contact-form" style="max-width: 450px; margin: 40px auto; text-align: center;">
      <h2 style="color: var(--green-soft); margin-bottom: 20px;">Secure Access</h2>
      <input type="password" id="adminPass" class="admin-input" placeholder="Enter master password">
      <button onclick="login()" class="hero-btn primary" style="width: 100%; border: none;">Login</button>
    </div>

    <div id="adminBox" class="booking-card" style="display:none; max-width: 100%; padding: 30px;">
      
      <div class="top-actions">
        <button onclick="exportExcel()" class="hero-btn primary small" style="border: none;">📄 Export to Excel</button>
        <button onclick="logout()" class="hero-btn ghost small">Logout</button>
      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Client Name</th>
              <th>Service Details</th>
              <th>Trip Type</th>
              <th>Date & Time</th>
              <th>Route (Pickup → Drop-off)</th>
              <th>Total Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    © 2026 Ride W Me Cabo — Admin Portal
  </footer>

  <script>
    const PASSWORD = "rideadmin2025";
    const loginBox = document.getElementById("loginBox");
    const adminBox = document.getElementById("adminBox");
    const tableBody = document.getElementById("tableBody");

    // Prevenir el submit al dar "Enter" en el input
    document.getElementById("adminPass").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        login();
      }
    });

    function login(){
      if(document.getElementById("adminPass").value === PASSWORD){
        localStorage.setItem("adminLogged","true");
        loginBox.style.display="none";
        adminBox.style.display="block";
        loadData();
      } else {
        alert("Incorrect password");
        document.getElementById("adminPass").value = "";
      }
    }

    function logout(){
      localStorage.removeItem("adminLogged");
      location.reload();
    }

    if(localStorage.getItem("adminLogged")==="true"){
      loginBox.style.display="none";
      adminBox.style.display="block";
      loadData();
    }

    function loadData(){
      const data = JSON.parse(localStorage.getItem("reservations")) || [];
      tableBody.innerHTML="";

      if(data.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 30px; color: #666;">No reservations found in local storage.</td></tr>`;
        return;
      }

      data.reverse().forEach((r,i)=>{
        // Usamos reverse() para que las reservaciones más nuevas salgan hasta arriba
        const realIndex = data.length - 1 - i; 
        
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="color: #fff; font-weight: 600;">${r.name || 'N/A'}<br><span style="font-size: 0.8rem; color: #888; font-weight: 300;">${r.phone || ''}</span></td>
          <td>${r.service_label || 'N/A'}<br><span style="font-size: 0.8rem; color: #888;">Pax: ${r.passengers || '-'}</span></td>
          <td>${r.trip_type || 'N/A'}</td>
          <td style="color: #fff;">${r.date || 'N/A'}<br><span style="font-size: 0.85rem; color: var(--green-soft);">${r.time || ''}</span></td>
          <td><strong style="color: #aaa;">Pickup:</strong> ${r.pickup || 'N/A'}<br><strong style="color: #aaa;">Drop:</strong> ${r.destination || 'N/A'}</td>
          <td style="color: var(--green-soft); font-weight: 600;">$${r.total_price || '0'} USD</td>
          <td style="min-width: 180px;">
            <button class="action-btn pdf" onclick="pdf(${realIndex})">PDF</button>
            <button class="action-btn edit" onclick="edit(${realIndex})">Edit</button>
            <button class="action-btn delete" onclick="del(${realIndex})">Del</button>
          </td>
        `;
        tableBody.appendChild(tr);
      });
    }

    function del(i){
      if(!confirm("Are you sure you want to delete this reservation permanently?")) return;
      const d = JSON.parse(localStorage.getItem("reservations")) || [];
      d.splice(i,1);
      localStorage.setItem("reservations",JSON.stringify(d));
      loadData();
    }

    function edit(i){
      const d = JSON.parse(localStorage.getItem("reservations"));
      const name = prompt("Edit Client Name:", d[i].name);
      if(name!==null && name.trim() !== "") {
        d[i].name = name;
        localStorage.setItem("reservations",JSON.stringify(d));
        loadData();
      }
    }

    function exportExcel(){
      const data = JSON.parse(localStorage.getItem("reservations")) || [];
      if(data.length === 0) {
        alert("No data to export.");
        return;
      }
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,"Reservations");
      XLSX.writeFile(wb,"RideWMe_Reservations.xlsx");
    }

    function pdf(i){
      const { jsPDF } = window.jspdf;
      const d = JSON.parse(localStorage.getItem("reservations"))[i];
      const pdf = new jsPDF();

      pdf.setFillColor(0, 193, 110);
      pdf.rect(0, 0, 210, 30, 'F');
      
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(20);
      pdf.text("Ride W Me Cabo", 20, 20);

      pdf.setTextColor(0, 0, 0);
      pdf.setFontSize(14);
      pdf.text("Reservation Itinerary", 20, 45);

      pdf.setFontSize(11);
      pdf.setTextColor(80, 80, 80);
      let y=60;
      
      const formatKey = (key) => key.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');

      Object.entries(d).forEach(([k,v])=>{
        // Ignoramos campos vacíos o internos que no sirven en el PDF
        if(v && k !== "created_at" && k !== "return_date_msg" && k !== "extra_hours_msg" && k !== "round_trip_price_msg" && k !== "extra_hours_total_msg") {
          pdf.setFont("helvetica", "bold");
          pdf.text(`${formatKey(k)}:`, 20, y);
          pdf.setFont("helvetica", "normal");
          pdf.text(`${v}`, 70, y);
          y+=8;
        }
      });

      pdf.save(`RideWMe_Booking_${d.name.replace(/\s+/g, '_')}.pdf`);
    }
  </script>

</body>
</html>
